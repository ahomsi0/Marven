name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` runs our postinstall, which normally rebuilds better-sqlite3
      # against Electron's Node ABI. In CI we want to test against the
      # *prebuilt Node* binary (so vitest under system Node can dlopen it), so
      # we skip the Electron rebuild. The release workflow does its own rebuild.
      - name: Install dependencies (host Node ABI)
        run: npm ci
        env:
          MARVEN_SKIP_ELECTRON_REBUILD: "1"

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test
