name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` runs our postinstall, which rebuilds native deps
      # (better-sqlite3, node-pty, sqlite-vec) against the host platform.
      # If this step fails on any platform, that's the canary that something
      # in our native dep chain regressed before any build runs.
      - name: Install dependencies (also exercises native rebuild)
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test
